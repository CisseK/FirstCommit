name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          days-before-issue-stale: 30
          days-before-issue-close: 7
          days-before-pr-stale: 14
          days-before-pr-close: 7

          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,intro

          stale-issue-message: |
            This issue has been inactive for 30 days.

            If you claimed it and are still working on it, leave a comment and it stays open. If you would like to release it so someone else can pick it up, that is also fine - just say so.

            No activity in the next 7 days and it will be closed automatically. It can always be reopened.

          stale-pr-message: |
            This pull request has been inactive for 14 days.

            If you are still working on it, push an update or leave a comment. If you are stuck, reach out to Ayush on LinkedIn - the link is in the README. Real help, real human.

            No activity in the next 7 days and it will be closed automatically.

          close-issue-message: |
            Closing due to inactivity. If you want to pick this up later, leave a comment and it will be reopened.

          close-pr-message: |
            Closing due to inactivity. Feel free to reopen this if you would like to continue.
